name: Windows build

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test-and-publish:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.302
          cache: true
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Restore
        run: dotnet restore StockWatchdog.slnx

      - name: Test
        run: dotnet test StockWatchdog.slnx --no-restore -c Release

      - name: Publish portable package
        run: dotnet publish src/StockWatchdog.App/StockWatchdog.App.csproj --no-restore -c Release -r win-x64 --self-contained -o artifacts/publish

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: StockWatchdog-win-x64
          path: artifacts/publish
          if-no-files-found: error
